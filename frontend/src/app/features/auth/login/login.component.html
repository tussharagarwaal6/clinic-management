<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Clinic Login</mat-card-title>
      <mat-card-subtitle>Admin and doctors can sign in here</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username / Email</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
        </mat-form-field>

        @if (error) {
          <p class="error-text">{{ error }}</p>
        }

        <button mat-flat-button color="primary" class="full-width" type="submit" [disabled]="loading">
          @if (loading) {
            Signing in...
          } @else {
            Login
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
